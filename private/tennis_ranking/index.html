<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jonathan Tennis Report Dashboard</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #172033;
        background: #f6f7f9;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 24px 48px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        margin: 8px 0 0;
        color: #667085;
      }

      a.button {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 6px;
        background: #155eef;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        white-space: nowrap;
      }

      .chart {
        width: 100%;
        min-height: 700px;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Jonathan Tennis Report Dashboard</h1>
          <p>USTA points, USTA NorCal rank, and WTN number trend.</p>
        </div>
        <a class="button" href="trend.svg">Open full chart</a>
      </header>
      <object class="chart" data="trend.svg" type="image/svg+xml">
        <a href="trend.svg">Open trend chart</a>
      </object>
    </main>
  </body>
</html>
